name: finanzas_app
description: App de registro de movimientos financieros personales
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Base de datos local
  sqflite: ^2.3.2
  path: ^1.9.0

  # Navegación y estado
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  fl_chart: ^0.68.0

  # Excel
  excel: ^4.0.2

  # Archivos
  file_picker: ^8.0.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  open_file: ^3.3.2

  # Supabase
  supabase_flutter: ^2.5.0

  # Utilidades
  uuid: ^4.3.3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21